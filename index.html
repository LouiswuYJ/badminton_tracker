<body class="bg-gray-100 p-3 max-w-md mx-auto">

  <h1 class="text-xl font-bold mb-3">🏸 Badminton Tracker</h1>

  <!-- Add Player -->
  <div class="bg-white p-3 rounded shadow mb-3">
    <input id="playerName" class="border p-2 w-full rounded" placeholder="Add player name" />
    <button onclick="addPlayer()" class="btn mt-2">Add Player</button>
  </div>

  <!-- Player Tags -->
  <div class="bg-white p-3 rounded shadow mb-3">
    <h2 class="font-semibold mb-2">Players</h2>
    <div id="playerTags" class="flex flex-wrap gap-2"></div>
  </div>

  <!-- Match Recorder -->
  <div class="bg-white p-3 rounded shadow mb-3">
    <h2 class="font-semibold mb-2">Record Match</h2>

    <div id="selectedTeams" class="text-sm mb-2 font-semibold text-center"></div>

    <div class="flex gap-2 mb-2">
      <input id="scoreA" type="number" class="border p-2 w-1/2 rounded" placeholder="Team A score" />
      <input id="scoreB" type="number" class="border p-2 w-1/2 rounded" placeholder="Team B score" />
    </div>

    <button onclick="saveMatch()" class="btn">Save Match</button>
  </div>

  <!-- Leaderboard -->
  <div class="bg-white p-3 rounded shadow mb-3">
    <h2 class="font-semibold mb-2">📊 Leaderboard</h2>
    <ul id="leaderboard" class="text-sm"></ul>
  </div>

  <!-- History -->
  <div class="bg-white p-3 rounded shadow">
    <h2 class="font-semibold mb-2">📜 History</h2>
    <ul id="history" class="text-sm space-y-1"></ul>
  </div>

  <script src="app.js"></script>
</body>
