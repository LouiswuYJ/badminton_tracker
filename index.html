<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Badminton Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="manifest" href="manifest.json">
  <style>
    /* Custom scrollbar for better mobile experience if needed, 
       but Tailwind's defaults are usually fine. */
  </style>
</head>

<body class="bg-gray-100 min-h-screen">

  <div class="container mx-auto px-4 py-6 max-w-6xl">
    <header class="mb-6 text-center md:text-left">
      <h1 class="text-3xl font-bold text-gray-800">🏸 Badminton Tracker</h1>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

      <!-- Left Column: Management & Recording -->
      <div class="space-y-6 lg:col-span-1">

        <!-- Add Player -->
        <div class="bg-white p-4 rounded-lg shadow-md">
          <label class="block text-sm font-semibold text-gray-700 mb-2">New Player</label>
          <div class="flex gap-2">
            <input id="playerName"
              class="border p-2 flex-grow rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="Name" />
            <button onclick="addPlayer()"
              class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 font-medium">Add</button>
          </div>
        </div>

        <!-- Player Tags -->
        <div class="bg-white p-4 rounded-lg shadow-md">
          <h2 class="font-semibold text-gray-700 mb-3 flex items-center gap-2">
            <span>👥</span> Players
          </h2>
          <div id="playerTags" class="flex flex-wrap gap-2 min-h-[50px]"></div>
          <p class="text-xs text-gray-500 mt-2">Tap to select 4 players for a match.</p>
        </div>

        <!-- Match Recorder -->
        <div class="bg-white p-4 rounded-lg shadow-md border-t-4 border-blue-500">
          <h2 class="font-semibold text-gray-700 mb-3 flex items-center gap-2">
            <span>📝</span> Record Match
          </h2>

          <div id="selectedTeams"
            class="text-sm mb-4 font-semibold text-center h-8 flex items-center justify-center bg-gray-50 rounded text-gray-600">
            <span class="text-gray-400 italic">Select 4 players...</span>
          </div>

          <div class="flex gap-3 mb-4">
            <div class="w-1/2">
              <label class="block text-xs text-gray-500 mb-1">Team A Score</label>
              <input id="scoreA" type="number"
                class="border p-2 w-full rounded focus:outline-none focus:ring-2 focus:ring-blue-500 text-center text-lg font-bold" />
            </div>
            <div class="w-1/2">
              <label class="block text-xs text-gray-500 mb-1">Team B Score</label>
              <input id="scoreB" type="number"
                class="border p-2 w-full rounded focus:outline-none focus:ring-2 focus:ring-blue-500 text-center text-lg font-bold" />
            </div>
          </div>

          <button onclick="saveMatch()"
            class="w-full bg-green-600 text-white px-4 py-3 rounded-lg hover:bg-green-700 font-bold shadow transition transform active:scale-95 mb-4">Save
            Match Result</button>

          <div class="relative flex py-2 items-center">
            <div class="flex-grow border-t border-gray-200"></div>
            <span class="flex-shrink-0 mx-4 text-gray-400 text-xs uppercase">or Quick Record</span>
            <div class="flex-grow border-t border-gray-200"></div>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <button onclick="quickWin('A')"
              class="bg-blue-100 text-blue-700 px-3 py-2 rounded-lg hover:bg-blue-200 font-medium text-sm border border-blue-200 transition">Team
              A Won</button>
            <button onclick="quickWin('B')"
              class="bg-blue-100 text-blue-700 px-3 py-2 rounded-lg hover:bg-blue-200 font-medium text-sm border border-blue-200 transition">Team
              B Won</button>
          </div>
        </div>

        <div class="text-center">
          <button onclick="resetData()" class="text-red-400 text-xs hover:text-red-600 underline">Reset All
            Data</button>
        </div>

      </div>

      <!-- Right Column: Stats & History -->
      <div class="space-y-6 lg:col-span-2">

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

          <!-- Leaderboard -->
          <div class="bg-white p-4 rounded-lg shadow-md h-fit">
            <h2 class="font-semibold text-gray-700 mb-3 flex items-center gap-2">
              <span>📊</span> Leaderboard
            </h2>
            <ul id="leaderboard" class="text-sm divide-y divide-gray-100"></ul>
          </div>

          <!-- History -->
          <div class="bg-white p-4 rounded-lg shadow-md">
            <h2 class="font-semibold text-gray-700 mb-3 flex items-center gap-2">
              <span>📜</span> Match History
            </h2>
            <ul id="matchHistory" class="text-sm space-y-2 max-h-[500px] overflow-y-auto pr-1"></ul>
          </div>

        </div>

      </div>

    </div>
  </div>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>

</html>
