<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Badminton Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }

    /* Smooth transitions for interactive elements */
    .player-tag { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    .player-tag:hover { transform: translateY(-1px); }
    .player-tag.selected { animation: pop 0.25s ease; }

    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .match-item { animation: slideIn 0.3s ease; }

    /* Custom scrollbar */
    .custom-scroll::-webkit-scrollbar { width: 4px; }
    .custom-scroll::-webkit-scrollbar-track { background: transparent; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 999px; }
    .custom-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    /* Glass card effect */
    .glass-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    /* Gradient text */
    .gradient-text {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
  </style>
</head>

<body class="bg-gradient-to-br from-slate-50 via-indigo-50/30 to-purple-50/20 min-h-screen">

  <!-- Header -->
  <header class="sticky top-0 z-50 glass-card border-b border-white/60 shadow-sm">
    <div class="container mx-auto px-4 py-4 max-w-6xl flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200">
          <span class="text-xl">🏸</span>
        </div>
        <div>
          <h1 class="text-xl font-bold text-slate-800 leading-tight">Badminton Tracker</h1>
          <p class="text-[11px] text-slate-400 font-medium tracking-wide uppercase">Match & Score Manager</p>
        </div>
      </div>
      <button onclick="resetData()"
        class="text-xs text-slate-400 hover:text-red-500 transition-colors px-3 py-1.5 rounded-lg hover:bg-red-50">
        Reset Data
      </button>
    </div>
  </header>

  <div class="container mx-auto px-4 py-6 max-w-6xl">

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">

      <!-- Left Column: Management & Recording -->
      <div class="space-y-5 lg:col-span-4">

        <!-- Add Player -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">Add Player</label>
          <div class="flex gap-2">
            <input id="playerName"
              class="border border-slate-200 px-4 py-2.5 flex-grow rounded-xl text-sm bg-slate-50/50
                     focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-400
                     placeholder:text-slate-300 transition-all"
              placeholder="Enter name..." />
            <button onclick="addPlayer()"
              class="bg-gradient-to-r from-indigo-500 to-indigo-600 text-white px-5 py-2.5 rounded-xl
                     hover:from-indigo-600 hover:to-indigo-700 font-semibold text-sm shadow-md
                     shadow-indigo-200 transition-all active:scale-95">
              Add
            </button>
          </div>
        </div>

        <!-- Player Tags -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
          <div class="flex items-center justify-between mb-3">
            <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Players</h2>
            <span id="selectionCount"
              class="text-[11px] font-semibold px-2 py-0.5 rounded-full bg-slate-100 text-slate-400">
              0/4
            </span>
          </div>
          <div id="playerTags" class="flex flex-wrap gap-2 min-h-[48px]"></div>
          <p class="text-[11px] text-slate-400 mt-3">Tap to select 4 players for a match</p>
        </div>

        <!-- Match Recorder -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
          <!-- Match header with gradient accent -->
          <div class="bg-gradient-to-r from-indigo-500 to-purple-600 px-5 py-3">
            <h2 class="text-sm font-semibold text-white/90 uppercase tracking-wider">Record Match</h2>
          </div>

          <div class="p-5 space-y-4">
            <!-- Team Display -->
            <div id="selectedTeams"
              class="text-sm font-semibold text-center py-3 px-4 bg-slate-50 rounded-xl
                     text-slate-500 border border-dashed border-slate-200">
              <span class="text-slate-400">Select 4 players above...</span>
            </div>

            <!-- Score Inputs -->
            <div class="flex gap-3">
              <div class="flex-1">
                <label class="block text-[11px] text-slate-400 mb-1.5 font-medium uppercase tracking-wider text-center">Team A</label>
                <input id="scoreA" type="number"
                  class="border border-slate-200 p-3 w-full rounded-xl text-center text-xl font-bold
                         bg-slate-50/50 focus:outline-none focus:ring-2 focus:ring-indigo-500/20
                         focus:border-indigo-400 transition-all text-slate-700" />
              </div>
              <div class="flex items-end pb-3">
                <span class="text-slate-300 font-bold text-lg">:</span>
              </div>
              <div class="flex-1">
                <label class="block text-[11px] text-slate-400 mb-1.5 font-medium uppercase tracking-wider text-center">Team B</label>
                <input id="scoreB" type="number"
                  class="border border-slate-200 p-3 w-full rounded-xl text-center text-xl font-bold
                         bg-slate-50/50 focus:outline-none focus:ring-2 focus:ring-indigo-500/20
                         focus:border-indigo-400 transition-all text-slate-700" />
              </div>
            </div>

            <!-- Save Button -->
            <button onclick="saveMatch()"
              class="w-full bg-gradient-to-r from-emerald-500 to-green-600 text-white px-4 py-3.5
                     rounded-xl hover:from-emerald-600 hover:to-green-700 font-bold shadow-lg
                     shadow-emerald-200/50 transition-all active:scale-[0.98] text-sm tracking-wide">
              Save Match Result
            </button>

            <!-- Divider -->
            <div class="relative flex items-center">
              <div class="flex-grow border-t border-slate-100"></div>
              <span class="flex-shrink-0 mx-3 text-slate-300 text-[11px] font-medium uppercase tracking-wider">Quick Record</span>
              <div class="flex-grow border-t border-slate-100"></div>
            </div>

            <!-- Quick Win Buttons -->
            <div class="grid grid-cols-2 gap-3">
              <button onclick="quickWin('A')"
                class="bg-indigo-50 text-indigo-600 px-3 py-2.5 rounded-xl hover:bg-indigo-100
                       font-semibold text-sm border border-indigo-100 transition-all active:scale-95">
                Team A Won
              </button>
              <button onclick="quickWin('B')"
                class="bg-purple-50 text-purple-600 px-3 py-2.5 rounded-xl hover:bg-purple-100
                       font-semibold text-sm border border-purple-100 transition-all active:scale-95">
                Team B Won
              </button>
            </div>
          </div>
        </div>

      </div>

      <!-- Right Column: Stats & History -->
      <div class="space-y-5 lg:col-span-8">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

          <!-- Leaderboard -->
          <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="px-5 pt-5 pb-3 flex items-center justify-between">
              <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Leaderboard</h2>
              <span class="text-[11px] text-slate-400 font-medium" id="playerCount"></span>
            </div>
            <ul id="leaderboard" class="text-sm divide-y divide-slate-50 px-2 pb-3"></ul>
          </div>

          <!-- Match History -->
          <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="px-5 pt-5 pb-3 flex items-center justify-between">
              <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Match History</h2>
              <span class="text-[11px] text-slate-400 font-medium" id="matchCount"></span>
            </div>
            <ul id="matchHistory"
              class="text-sm space-y-2 max-h-[520px] overflow-y-auto custom-scroll px-4 pb-4">
            </ul>
          </div>

        </div>

        <!-- Games Played (full width) -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
          <div class="px-5 pt-5 pb-3 flex items-center justify-between">
            <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Games Played</h2>
          </div>
          <ul id="gamesPlayed" class="text-sm divide-y divide-slate-50 px-2 pb-3"></ul>
        </div>

      </div>

    </div>

    <!-- Share Button -->
    <div class="mt-8 mb-4 text-center">
      <button onclick="shareToWhatsApp()"
        class="inline-flex items-center gap-2 bg-[#25D366] hover:bg-[#1da851] text-white px-6 py-3
               rounded-xl font-semibold text-sm shadow-lg shadow-emerald-200/50 transition-all active:scale-95">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        Share to WhatsApp
      </button>
    </div>

  </div>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>

</html>
